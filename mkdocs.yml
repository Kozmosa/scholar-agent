site_name: AINRF Docs and References
site_description: Product docs, design notes, and reference materials for AINRF
docs_dir: .cache/html-notes/docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - search.suggest
    - search.highlight

plugins:
  - search
  - mermaid2:
      javascript: assets/javascripts/vendor/mermaid-10.4.0.min.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
